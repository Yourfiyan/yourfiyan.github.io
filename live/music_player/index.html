<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar (Desktop) -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fab fa-spotify"></i> <span>Music Player</span>
            </div>
            <nav>
                <ul>
                    <li class="active"><a href="#"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="#"><i class="fas fa-search"></i> Search</a></li>
                    <li><a href="#"><i class="fas fa-book"></i> Your Library</a></li>
                </ul>
            </nav>
            <div class="sidebar-divider"></div>
            <div class="playlists">
                <div class="create-playlist"><i class="fas fa-plus-square"></i> Create Playlist</div>
                <div class="liked-songs"><i class="fas fa-heart"></i> Liked Songs</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-view">
            <header class="top-bar">
                <div class="nav-arrows">
                    <button class="arrow-btn"><i class="fas fa-chevron-left"></i></button>
                    <button class="arrow-btn"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="user-menu">
                    <button class="user-btn"><i class="fas fa-user-circle"></i> User</button>
                </div>
            </header>

            <div class="playlist-header">
                <div class="playlist-cover">
                    <i class="fas fa-music"></i>
                </div>
                <div class="playlist-info">
                    <span class="playlist-type">Playlist</span>
                    <h1 class="playlist-title">Local Music</h1>
                    <div class="playlist-meta">
                        <span id="song-count">0 songs</span>
                    </div>
                </div>
            </div>

            <div class="playlist-controls">
                <button class="play-btn-large" id="main-play-btn"><i class="fas fa-play"></i></button>
                <button class="action-btn"><i class="far fa-heart"></i></button>
                <button class="action-btn"><i class="fas fa-ellipsis-h"></i></button>
            </div>

            <div class="song-list-header">
                <div class="col-number">#</div>
                <div class="col-title">Title</div>
                <div class="col-album">Date Added</div>
                <div class="col-duration"><i class="far fa-clock"></i></div>
            </div>

            <div id="playlist-container">
                <!-- Songs injected here -->
                <div class="loading">Loading music...</div>
            </div>
            
            <div class="spacer"></div>
        </main>

        <!-- Player Bar -->
        <footer class="player-bar">
            <div class="player-left">
                <div class="now-playing-cover">
                    <i class="fas fa-music"></i>
                </div>
                <div class="now-playing-info">
                    <div class="song-title" id="current-song-title">Select a song</div>
                    <div class="artist-name">Local Artist</div>
                </div>
                <button class="like-btn"><i class="far fa-heart"></i></button>
            </div>

            <div class="player-center">
                <div class="player-controls">
                    <button class="control-btn shuffle"><i class="fas fa-random"></i></button>
                    <button class="control-btn" id="prev-btn"><i class="fas fa-step-backward"></i></button>
                    <button class="control-btn play-circle" id="play-btn"><i class="fas fa-play"></i></button>
                    <button class="control-btn" id="next-btn"><i class="fas fa-step-forward"></i></button>
                    <button class="control-btn repeat"><i class="fas fa-redo"></i></button>
                </div>
                <div class="playback-bar">
                    <span id="current-time">0:00</span>
                    <div class="progress-container" id="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <span id="total-duration">0:00</span>
                </div>
            </div>

            <div class="player-right">
                <button class="control-btn"><i class="fas fa-list"></i></button>
                <button class="control-btn"><i class="fas fa-laptop-house"></i></button>
                <div class="volume-bar">
                    <button class="control-btn" id="mute-btn"><i class="fas fa-volume-up"></i></button>
                    <div class="volume-slider-container" id="volume-container">
                        <div class="volume-slider" id="volume-bar"></div>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
