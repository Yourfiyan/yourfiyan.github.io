    <!-- FOUC prevention: set theme class synchronously before any paint -->
    <script>
      (function(){
        var stored = localStorage.getItem('theme');
        if (stored === 'dark' || stored === 'light') {
          if (stored === 'dark') document.documentElement.classList.add('dark');
        } else {
          // No stored pref — use OS / browser preference
          if (!window.matchMedia || !window.matchMedia('(prefers-color-scheme: light)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>


</head>
  <body class="bg-background text-foreground antialiased selection:bg-primary/30 selection:text-white overflow-x-hidden">
    <div id="root"></div>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
